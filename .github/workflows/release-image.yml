name: Docker Image

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: docker-image-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  prepare:
    runs-on: ubuntu-24.04
    outputs:
      version_tag: ${{ steps.meta.outputs.version_tag }}
      minor_tag: ${{ steps.meta.outputs.minor_tag }}
      major_tag: ${{ steps.meta.outputs.major_tag }}
      latest_tag: ${{ steps.meta.outputs.latest_tag }}
      image_ref: ${{ steps.meta.outputs.image_ref }}
      platforms: ${{ steps.meta.outputs.platforms }}
      oci_labels: ${{ steps.meta.outputs.oci_labels }}
      image_annotations: ${{ steps.meta.outputs.image_annotations }}
      oci_annotations: ${{ steps.meta.outputs.oci_annotations }}
    steps:
      - name: Validate release tag and derive metadata
        id: meta
        shell: bash
        env:
          REPOSITORY_OWNER: ${{ github.repository_owner }}
        run: |
          set -euo pipefail

          source_url="https://github.com/ghfhffh12345/ytmusic-service"
          documentation_url="${source_url}#readme"
          description="gRPC service layer for various YouTube Music features"
          title="ytmusic-service"
          tag_name="${GITHUB_REF_NAME:-}"

          if [[ ! "${tag_name}" =~ ^v([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            echo "Release tags must exactly match vX.Y.Z; received '${tag_name:-<empty>}'." >&2
            exit 1
          fi

          owner="${REPOSITORY_OWNER,,}"
          version_tag="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}.${BASH_REMATCH[3]}"
          minor_tag="${BASH_REMATCH[1]}.${BASH_REMATCH[2]}"
          major_tag="${BASH_REMATCH[1]}"
          latest_tag="latest"
          image_ref="ghcr.io/${owner}/ytmusic-service"

          {
            echo "version_tag=${version_tag}"
            echo "minor_tag=${minor_tag}"
            echo "major_tag=${major_tag}"
            echo "latest_tag=${latest_tag}"
            echo "image_ref=${image_ref}"
            echo "platforms=linux/amd64,linux/arm64"
            echo "oci_labels<<EOF"
            echo "org.opencontainers.image.source=https://github.com/ghfhffh12345/ytmusic-service"
            echo "org.opencontainers.image.title=${title}"
            echo "org.opencontainers.image.description=${description}"
            echo "org.opencontainers.image.documentation=${documentation_url}"
            echo "org.opencontainers.image.revision=${GITHUB_SHA}"
            echo "org.opencontainers.image.version=${version_tag}"
            echo "EOF"
            echo "image_annotations<<EOF"
            echo "org.opencontainers.image.source=https://github.com/ghfhffh12345/ytmusic-service"
            echo "org.opencontainers.image.title=${title}"
            echo "org.opencontainers.image.description=${description}"
            echo "org.opencontainers.image.documentation=${documentation_url}"
            echo "org.opencontainers.image.revision=${GITHUB_SHA}"
            echo "org.opencontainers.image.version=${version_tag}"
            echo "EOF"
            echo "oci_annotations<<EOF"
            echo "index:org.opencontainers.image.source=https://github.com/ghfhffh12345/ytmusic-service"
            echo "manifest-descriptor:org.opencontainers.image.source=https://github.com/ghfhffh12345/ytmusic-service"
            echo "index:org.opencontainers.image.title=${title}"
            echo "manifest-descriptor:org.opencontainers.image.title=${title}"
            echo "index:org.opencontainers.image.description=${description}"
            echo "manifest-descriptor:org.opencontainers.image.description=${description}"
            echo "index:org.opencontainers.image.documentation=${documentation_url}"
            echo "manifest-descriptor:org.opencontainers.image.documentation=${documentation_url}"
            echo "index:org.opencontainers.image.revision=${GITHUB_SHA}"
            echo "manifest-descriptor:org.opencontainers.image.revision=${GITHUB_SHA}"
            echo "index:org.opencontainers.image.version=${version_tag}"
            echo "manifest-descriptor:org.opencontainers.image.version=${version_tag}"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

  build-amd64:
    needs: prepare
    runs-on: ubuntu-24.04
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push linux/amd64 image by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          provenance: false
          outputs: type=image,name=${{ needs.prepare.outputs.image_ref }},push-by-digest=true,name-canonical=true,push=true
          labels: ${{ needs.prepare.outputs.oci_labels }}
          annotations: ${{ needs.prepare.outputs.image_annotations }}

  build-arm64:
    needs: prepare
    runs-on: ubuntu-24.04-arm
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push linux/arm64 image by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/arm64
          provenance: false
          outputs: type=image,name=${{ needs.prepare.outputs.image_ref }},push-by-digest=true,name-canonical=true,push=true
          labels: ${{ needs.prepare.outputs.oci_labels }}
          annotations: ${{ needs.prepare.outputs.image_annotations }}

  publish-manifest:
    needs:
      - prepare
      - build-amd64
      - build-arm64
    runs-on: ubuntu-24.04
    steps:
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Create and push multi-arch manifest
        shell: bash
        env:
          IMAGE_REF: ${{ needs.prepare.outputs.image_ref }}
          VERSION_TAG: ${{ needs.prepare.outputs.version_tag }}
          MINOR_TAG: ${{ needs.prepare.outputs.minor_tag }}
          MAJOR_TAG: ${{ needs.prepare.outputs.major_tag }}
          LATEST_TAG: ${{ needs.prepare.outputs.latest_tag }}
          OCI_ANNOTATIONS: ${{ needs.prepare.outputs.oci_annotations }}
          AMD64_DIGEST: ${{ needs.build-amd64.outputs.digest }}
          ARM64_DIGEST: ${{ needs.build-arm64.outputs.digest }}
        run: |
          set -euo pipefail

          create_args=(
            --tag "${IMAGE_REF}:${VERSION_TAG}"
            --tag "${IMAGE_REF}:${MINOR_TAG}"
            --tag "${IMAGE_REF}:${MAJOR_TAG}"
            --tag "${IMAGE_REF}:${LATEST_TAG}"
          )

          while IFS= read -r annotation; do
            if [[ -n "${annotation}" ]]; then
              create_args+=(--annotation "${annotation}")
            fi
          done <<< "${OCI_ANNOTATIONS}"

          create_args+=(
            "${IMAGE_REF}@${AMD64_DIGEST}"
            "${IMAGE_REF}@${ARM64_DIGEST}"
          )

          docker buildx imagetools create "${create_args[@]}"

      - name: Inspect published manifest
        shell: bash
        env:
          IMAGE_REF: ${{ needs.prepare.outputs.image_ref }}
          VERSION_TAG: ${{ needs.prepare.outputs.version_tag }}
        run: |
          set -euo pipefail
          for attempt in 1 2 3 4 5 6 7; do
            if docker buildx imagetools inspect "${IMAGE_REF}:${VERSION_TAG}"; then
              exit 0
            fi

            if [[ "${attempt}" -eq 7 ]]; then
              echo "Published manifest was still unavailable after ${attempt} inspection attempts." >&2
              exit 1
            fi

            echo "Manifest not visible yet in GHCR; retrying in 10 seconds (attempt ${attempt}/7)." >&2
            sleep 10
          done

      - name: Summarize published image
        shell: bash
        env:
          IMAGE_REF: ${{ needs.prepare.outputs.image_ref }}
          VERSION_TAG: ${{ needs.prepare.outputs.version_tag }}
          MINOR_TAG: ${{ needs.prepare.outputs.minor_tag }}
          MAJOR_TAG: ${{ needs.prepare.outputs.major_tag }}
          LATEST_TAG: ${{ needs.prepare.outputs.latest_tag }}
          PLATFORMS: ${{ needs.prepare.outputs.platforms }}
        run: |
          set -euo pipefail
          {
            echo "## Docker image published"
            echo
            echo "- Image ref: \`${IMAGE_REF}\`"
            echo "- Tags:"
            echo "  - \`${VERSION_TAG}\`"
            echo "  - \`${MINOR_TAG}\`"
            echo "  - \`${MAJOR_TAG}\`"
            echo "  - \`${LATEST_TAG}\`"
            echo "- Platforms: \`${PLATFORMS}\`"
            echo "- Result: image pushed to GHCR"
          } >> "${GITHUB_STEP_SUMMARY}"
