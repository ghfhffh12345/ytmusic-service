name: Docker Image

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Choose between an act-driven local build and a publish run.
        required: true
        default: local
        type: choice
        options:
          - local
          - publish
      platforms:
        description: Choose the host architecture or an explicit linux/amd64 + linux/arm64 build.
        required: true
        default: host
        type: choice
        options:
          - host
          - multiarch
      tag_override:
        description: Optional image tag override. Publish mode otherwise requires HEAD to be on an exact git tag.
        required: false
        default: ""
        type: string

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

concurrency:
  group: docker-image-${{ github.workflow }}-${{ github.ref }}-${{ inputs.mode }}-${{ inputs.platforms }}
  cancel-in-progress: false

jobs:
  build-image:
    name: Build Docker Image
    runs-on: ubuntu-22.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Validate workflow inputs
        shell: bash
        env:
          INPUT_MODE: ${{ inputs.mode }}
          INPUT_PLATFORMS: ${{ inputs.platforms }}
          ACT_ENV: ${{ env.ACT }}
        run: |
          set -euo pipefail

          if [[ "${INPUT_MODE}" == "local" && "${ACT_ENV:-}" != "true" ]]; then
            echo "local mode is only supported when the workflow is run under act (ACT=true)" >&2
            exit 1
          fi

          if [[ "${INPUT_MODE}" == "publish" && "${INPUT_PLATFORMS}" != "multiarch" ]]; then
            echo "publish mode requires platforms=multiarch" >&2
            exit 1
          fi

      - name: Derive image metadata
        id: meta
        shell: bash
        env:
          INPUT_MODE: ${{ inputs.mode }}
          INPUT_PLATFORMS: ${{ inputs.platforms }}
          INPUT_TAG_OVERRIDE: ${{ inputs.tag_override }}
          REPOSITORY_OWNER: ${{ github.repository_owner }}
          REPOSITORY_NAME: ${{ github.repository }}
        run: |
          set -euo pipefail

          owner="${REPOSITORY_OWNER:-ghfhffh12345}"
          owner="${owner,,}"
          repo="${REPOSITORY_NAME:-ghfhffh12345/ytmusic-service}"

          image_name="ytmusic-service"
          registry_namespace="ghcr.io/${owner}"
          image_ref="${registry_namespace}/${image_name}"

          host_arch="$(uname -m)"
          case "${host_arch}" in
            x86_64|amd64)
              host_platform="linux/amd64"
              ;;
            aarch64|arm64)
              host_platform="linux/arm64"
              ;;
            *)
              echo "Unsupported host architecture: ${host_arch}" >&2
              exit 1
              ;;
          esac

          if [[ "${INPUT_PLATFORMS}" == "host" ]]; then
            build_platforms="${host_platform}"
            use_qemu="false"
          else
            build_platforms="linux/amd64,linux/arm64"
            use_qemu="true"
          fi

          git_workspace="${GITHUB_WORKSPACE:-.}"

          short_sha="$(git -C "${git_workspace}" rev-parse --short=12 HEAD 2>/dev/null || true)"
          if [[ -z "${short_sha}" ]]; then
            short_sha="${GITHUB_SHA:0:12}"
          fi

          head_commit="$(git -C "${git_workspace}" rev-parse HEAD 2>/dev/null || true)"
          if [[ -z "${head_commit}" ]]; then
            head_commit="${GITHUB_SHA}"
          fi
          exact_head_tag="$(git -C "${git_workspace}" describe --tags --exact-match 2>/dev/null || true)"

          source_tag="${INPUT_TAG_OVERRIDE}"
          if [[ "${INPUT_MODE}" == "publish" && -n "${source_tag}" ]]; then
            override_commit="$(git -C "${git_workspace}" rev-parse -q --verify "refs/tags/${source_tag}^{commit}" 2>/dev/null || true)"
            if [[ -z "${override_commit}" ]]; then
              echo "publish mode tag_override must reference an existing git tag" >&2
              exit 1
            fi
            if [[ "${override_commit}" != "${head_commit}" ]]; then
              echo "publish mode tag_override must reference a git tag that points at HEAD" >&2
              exit 1
            fi
          fi

          if [[ -z "${source_tag}" ]]; then
            source_tag="${exact_head_tag}"
          fi

          if [[ -n "${source_tag}" ]]; then
            primary_tag="${source_tag#v}"
          else
            primary_tag="local-${short_sha}"
          fi

          if [[ "${INPUT_MODE}" == "publish" && -z "${source_tag}" ]]; then
            echo "publish mode requires HEAD to be on an exact git tag or a matching tag_override input" >&2
            exit 1
          fi

          declare -a tags=()
          declare -A seen=()

          add_tag() {
            local candidate="$1"
            if [[ -n "${candidate}" && -z "${seen[$candidate]:-}" ]]; then
              tags+=("${image_ref}:${candidate}")
              seen["$candidate"]=1
            fi
          }

          add_tag "${primary_tag}"

          if [[ "${INPUT_MODE}" == "local" ]]; then
            add_tag "local"
          fi

          if [[ "${INPUT_MODE}" == "publish" && "${primary_tag}" =~ ^([0-9]+)\.([0-9]+)\.([0-9]+)$ ]]; then
            add_tag "${BASH_REMATCH[1]}.${BASH_REMATCH[2]}"
            add_tag "${BASH_REMATCH[1]}"
            add_tag "latest"
          fi

          {
            echo "image_ref=${image_ref}"
            echo "build_platforms=${build_platforms}"
            echo "use_qemu=${use_qemu}"
            echo "primary_tag=${primary_tag}"
            echo "tags<<EOF"
            printf '%s\n' "${tags[@]}"
            echo "EOF"
            echo "oci_labels<<EOF"
            echo "org.opencontainers.image.title=ytmusic-service"
            echo "org.opencontainers.image.description=gRPC service layer for various YouTube Music features"
            echo "org.opencontainers.image.revision=${GITHUB_SHA}"
            echo "org.opencontainers.image.version=${primary_tag}"
            echo "org.opencontainers.image.documentation=https://github.com/${repo}#readme"
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Validate act publish secrets
        if: ${{ inputs.mode == 'publish' }}
        shell: bash
        env:
          ACT_ENV: ${{ env.ACT }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          set -euo pipefail
          if [[ "${ACT_ENV:-}" == "true" ]]; then
            test -n "${GHCR_USERNAME}" || { echo "GHCR_USERNAME is required for act publish mode" >&2; exit 1; }
            test -n "${GHCR_TOKEN}" || { echo "GHCR_TOKEN is required for act publish mode" >&2; exit 1; }
          fi

      - name: Set up QEMU
        if: ${{ steps.meta.outputs.use_qemu == 'true' }}
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        if: ${{ inputs.mode == 'publish' }}
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ secrets.GHCR_USERNAME != '' && secrets.GHCR_USERNAME || github.actor }}
          password: ${{ secrets.GHCR_TOKEN != '' && secrets.GHCR_TOKEN || github.token }}

      - name: Prepare local OCI archive directory
        if: ${{ inputs.mode == 'local' && inputs.platforms == 'multiarch' }}
        run: mkdir -p dist

      - name: Build local host-architecture image
        if: ${{ inputs.mode == 'local' && inputs.platforms == 'host' }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          load: true
          platforms: ${{ steps.meta.outputs.build_platforms }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.oci_labels }}

      - name: Build local multi-architecture OCI archive
        if: ${{ inputs.mode == 'local' && inputs.platforms == 'multiarch' }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          platforms: ${{ steps.meta.outputs.build_platforms }}
          outputs: type=oci,dest=${{ github.workspace }}/dist/ytmusic-service-multiarch.tar
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.oci_labels }}

      - name: Export multi-architecture OCI archive for act
        if: ${{ env.ACT == 'true' && inputs.mode == 'local' && inputs.platforms == 'multiarch' }}
        shell: bash
        run: |
          set -euo pipefail
          docker run --rm -i \
            -v "${GITHUB_WORKSPACE}:/host-workspace" \
            alpine:3.22 \
            sh -c '
              set -euo pipefail
              owner="$(stat -c "%u:%g" /host-workspace)"
              mkdir -p /host-workspace/dist
              cat > /host-workspace/dist/ytmusic-service-multiarch.tar
              chown "${owner}" /host-workspace/dist /host-workspace/dist/ytmusic-service-multiarch.tar
            ' \
            < "${GITHUB_WORKSPACE}/dist/ytmusic-service-multiarch.tar"

      - name: Build and push published image
        if: ${{ inputs.mode == 'publish' }}
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: ${{ steps.meta.outputs.build_platforms }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.oci_labels }}

      - name: Summarize image result
        shell: bash
        env:
          INPUT_MODE: ${{ inputs.mode }}
          INPUT_PLATFORMS: ${{ inputs.platforms }}
          BUILD_PLATFORMS: ${{ steps.meta.outputs.build_platforms }}
          IMAGE_TAGS: ${{ steps.meta.outputs.tags }}
          IMAGE_REF: ${{ steps.meta.outputs.image_ref }}
        run: |
          set -euo pipefail
          {
            echo "## Docker image result"
            echo
            echo "- Mode: \`${INPUT_MODE}\`"
            echo "- Platforms: \`${BUILD_PLATFORMS}\`"
            echo "- Image ref: \`${IMAGE_REF}\`"
            echo "- Tags:"
            while IFS= read -r line; do
              echo "  - \`${line}\`"
            done <<< "${IMAGE_TAGS}"
            if [[ "${INPUT_MODE}" == "local" && "${INPUT_PLATFORMS}" == "host" ]]; then
              echo "- Result: image loaded into the local Docker daemon"
            elif [[ "${INPUT_MODE}" == "local" ]]; then
              echo "- Result: OCI archive written to \`dist/ytmusic-service-multiarch.tar\`"
            else
              echo "- Result: image pushed to GHCR"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"
